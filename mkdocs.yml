      - Siemens: career/siemens.md
      - SoftwareOne: career/softwareone.md
      - TRUMPF: career/trumpf.md
      - Earlier career: career/earlier-career.md
  - Projects:
      - Portfolio overview: projects/index.md
      - Capability meta-framework: projects/capability-meta-framework.md
      - Minimal API platform: projects/minimal-api-platform.md
      - Testing SDK: projects/testing-sdk.md
      - Validation engine: projects/validation-engine.md
      - OpenAPI infrastructure: projects/openapi-infrastructure.md
      - Error handling: projects/error-handling.md
      - Deployment & provider model: projects/deployment-provider-model.md
      - Developer experience: projects/developer-experience.md
  - Architecture:
      - Framework engineering: architecture/framework-engineering.md
      - Testing is architecture: architecture/testing-is-architecture.md
      - API design: architecture/api-design.md
      - Performance: architecture/performance.md
      - ADR index: architecture/adrs/index.md
      - ADR 001 · Conditional validation: architecture/adrs/001-conditional-validation.md
      - ADR 002 · Infra/backend validators: architecture/adrs/002-validator-sync-strategy.md
  - Open Source:
